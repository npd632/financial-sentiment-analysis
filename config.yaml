# Configuration settings for Financial Sentiment Analysis

data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  external_path: "data/external/"
  phrasebank_path: "data/raw/PhraseBank/data.csv"
  phrasebank_clean_path: "data/processed/phrasebank_clean.csv"
  news_path: "data/raw/DailyFinancialNews/analyst_ratings_processed.csv"
  news_subset_path: "data/processed/news_subset.csv"
  aligned_news_prices_path: "data/processed/aligned_news_prices.csv"
  prices_daily_path: "data/external/prices_daily.parquet"
  spy_prices_path: "data/external/spy_prices.parquet"
  news_start_date: "2018-01-01"
  news_tickers:
    - MRK
    - MS
    - MU
    - NVDA
    - QQQ
    - M
    - EBAY
    - NFLX
    - GILD
    - VZ
    - DAL
    - JNJ
    - QCOM
    - BABA
    - KO
    - ORCL
    - FDX
    - HD
    - WFC
  price_start_date: "2018-01-01"
  price_end_date: "2020-06-11"
  spy_end_date: "2020-06-12"
  ticker_aliases_path: "config/ticker_aliases.yaml"
  price_test_start_date: "2020-01-01"
  validation_start_date: "2019-10-01"
  train_end_date: "2019-09-30"
  large_move_threshold: 0.005
  train_split: 0.8
  random_seed: 42

  forward_flat_threshold: 0.003
  forward_label_mode: "excess_1d"
  company_filter_enabled: true
  price_model_dataset_phrasebank_path: "data/processed/price_model_dataset_phrasebank.parquet"
  price_model_dataset_news_path: "data/processed/price_model_dataset_news.parquet"

models:
  baseline:
    tfidf_max_features: 5000
    svm_kernel: "linear"
    naive_bayes_alpha: 1.0
    save_path: "models/baseline/"

  finbert:
    pretrained_model: "yiyanghkust/finbert-tone"
    max_length: 128
    batch_size: 16
    epochs: 3
    learning_rate: 2.0e-5
    save_path: "models/finbert_finetuned/"

  finbert_news:
    init_checkpoint: "models/finbert_finetuned/"
    save_path: "models/finbert_news_adapted/"
    max_length: 128
    batch_size: 16
    epochs: 2
    learning_rate: 1.0e-5
    direction_loss_weight: 1.0
    sentiment_distill_weight: 0.5

  price_direction:
    save_path: "models/price_direction/"
    estimator: "lightgbm"
    pca_components: 64
    calibration_method: "isotonic"
    calibration_cv: 3
    confidence_threshold: 0.55
    lgbm_n_estimators: 500
    lgbm_learning_rate: 0.05
    lgbm_num_leaves: 31
    early_stopping_rounds: 50

evaluation:
  metrics_path: "evaluation/metrics.json"
  metrics_module1_path: "evaluation/metrics_module1.json"
  metrics_module2_path: "evaluation/metrics_module2.json"
  metrics_module3_path: "evaluation/metrics_module3.json"
  figures_path: "evaluation/figures/"
